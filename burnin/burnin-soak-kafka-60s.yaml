# KubeMQ Kafka burn-in — bounded 60s SOAK (the per-language burn-in agents run this, §7.5).
# Run: KUBEMQ_BROKER_ADDRESS=localhost:9092 go run . --config burnin-soak-kafka-60s.yaml --run
# Requires a live server with CONNECTORS_KAFKA_ENABLE=true.
# Integrity gates STRICT (honest, not force-pass); latency/throughput at the cold-local envelope.
version: "2"

broker:
  address: "localhost:9092"
  client_id_prefix: "burnin-kafka"

mode: "soak"
duration: "60s"
run_id: ""
warmup_duration: "8s"

kafka:
  acks: "all"
  compression: "lz4"
  partitions: 3
  replication_factor: 1
  isolation_level: "read_committed"
  idempotent: true
  transactional: true
  group_prefix: "burnin-kafka-grp"
  topic_prefix: "burnin"
  fetch_max_wait_ms: 500
  txn_timeout_ms: 60000
  sasl_mechanism: ""
  sasl_username: ""
  sasl_password: ""
  tls: false

workers:
  produce_round_trip: { enabled: true, channels: 1, producers_per_channel: 1, consumers_per_channel: 2, rate: 50 }
  keyed_ordering:     { enabled: true, channels: 1, producers_per_channel: 1, consumers_per_channel: 1, rate: 30 }
  consumer_group:     { enabled: true, channels: 1, producers_per_channel: 1, consumers_per_channel: 3, rate: 30 }
  offset_commit_lag:  { enabled: true, channels: 1, producers_per_channel: 1, consumers_per_channel: 1, rate: 30 }
  admin_topic_churn:  { enabled: true, channels: 1, producers_per_channel: 1, consumers_per_channel: 1, rate: 10 }
  transactions_eos:   { enabled: true, channels: 1, producers_per_channel: 1, consumers_per_channel: 1, rate: 20 }

message:
  size_mode: "fixed"
  size_bytes: 1024
  size_distribution: "256:80,4096:15,65536:5"
  reorder_window: 10000

metrics:
  port: 8898
  report_interval: "15s"

logging: { format: "text", level: "info" }
forced_disconnect: { interval: "0", duration: "5s" }
recovery: { reconnect_interval: "1s", reconnect_max_interval: "30s", reconnect_multiplier: 2.0 }
shutdown: { drain_timeout_seconds: 15 }
output:
  report_file: "report-kafka-soak.json"
  sdk_version: ""

thresholds:
  max_loss_pct: 0.0
  max_duplication_pct: 0.0
  max_offset_order_violations: 0
  max_group_loss_across_rebalance: 0
  max_eos_violations: 0             # KIP-890 V1 same-epoch residual EXCLUDED (§2.5)
  max_lag_accuracy_error_msgs: 1
  max_p50_latency_ms: 5000
  max_p95_latency_ms: 10000
  max_p99_latency_ms: 20000
  max_p999_latency_ms: 30000
  min_throughput_pct: 50
  max_error_rate_pct: 2.0
  max_memory_growth_factor: 3.0
  max_downtime_pct: 25
  max_duration: "168h"

warmup: { max_parallel_channels: 10, timeout_per_channel_ms: 5000 }
cors: { origins: "*" }
